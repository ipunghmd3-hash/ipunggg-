<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#eef4ff;
  color:#1e293b;
}


.header{
  position:sticky;
  top:0;
  z-index:100;
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(0,0,0,0.05);
  padding:14px;
  display:flex;
  justify-content:center;
}

.header-center{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:600;
  font-size:18px;
  color:#2563eb;
}

.cart-svg{
  width:22px;
  height:22px;
  cursor:pointer;
  transition:0.2s;
}

.cart-svg:hover{
  stroke:#1e40af;
  fill:#1e40af;
}

.banner{
  width:100%;
  height:181px;

  border:1px solid #2563eb;
  border-radius:0 0 20px 20px;

  overflow:hidden; 
}

.slider{
  display:flex;
  height:100%;
  transition:0.5s ease;
  will-change: transform;
}

.slider img{
  width:100%;
  height:100%;
  object-fit:cover;
  flex-shrink:0;
}


.container{
  padding:15px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:15px;

  margin-top:-60px; 
  position:relative;
  z-index:2;
}

.banner{
  position:relative;
  z-index:1;
  margin-bottom:20px;
}


.card{
  background:white;
  border-radius:16px;
  padding:12px;
  text-align:center;
  box-shadow:0 8px 20px rgba(37,99,235,0.08);
  transition:0.25s;
  border:1px solid rgba(37,99,235,0.08);
}

.card:hover{
  transform:translateY(-8px) scale(1.02);
  box-shadow:0 12px 25px rgba(37,99,235,0.15);
}

.card img{
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:12px;
  margin-bottom:8px;
}


.nama{
  font-size:14px;
  font-weight:500;
}

.harga{
  color:#2563eb;
  font-weight:600;
  margin-top:3px;
}


.btn{
  margin-top:10px;
  background:linear-gradient(135deg,#3b82f6,#60a5fa);
  color:white;
  padding:8px;
  border-radius:10px;
  font-size:13px;
  cursor:pointer;
  transition:0.2s;
}

.btn:hover{
  opacity:0.9;
}


.section-title{
  font-size:18px;
  font-weight:600;
  color:#1e3a8a;
}

.section-desc{
  font-size:13px;
  color:#64748b;
  margin-top:2px;
}

.section-line{
  height:3px;
  width:50px;
  background:linear-gradient(90deg,#3b82f6,#60a5fa);
  border-radius:10px;
  margin:8px 0 15px;
}

.section{
  grid-column:1/-1;
}


.grid-produk{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:15px;
}

.btn:active{
  transform:scale(0.95);
}

.info-box{
  background:#eff6ff;
  border:1px solid #bfdbfe;
  color:#1e40af;
  font-size:12px;
  padding:8px;
  border-radius:10px;
  margin-top:6px;
  text-align:left;
}

.footer{
  text-align:center;
  font-size:12px;
  color:#1e293b;
  font-weight:500;
  padding:20px 10px;
  margin-top:20px;
  border-top:1px solid rgba(0,0,0,0.05);
  text-shadow:0 1px 2px rgba(0,0,0,0.1);
  position:relative;
  z-index:5;
}

.info-title{
  font-weight:600;
  font-size:13px;
  margin-bottom:4px;
}

.info-text{
  font-size:12px;
}

.slider{
  display:flex;
  height:100%;
  transition:0.5s ease;
  will-change: transform;
}

html{
  scroll-behavior: smooth;
}

.reveal{
  opacity:0;
  transform:translateY(40px);
  transition:all 0.8s ease;
}

.reveal.active{
  opacity:1;
  transform:translateY(0);
}

.btn{
  margin-top:10px;
  background:linear-gradient(135deg,#3b82f6,#60a5fa);
  color:white;
  padding:8px;
  border-radius:10px;
  font-size:13px;
  cursor:pointer;
  transition:0.2s;

  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
}

.btn svg{
  width:16px;
  height:16px;
}

.btn:hover{
  transform:translateY(-2px);
  box-shadow:0 6px 15px rgba(59,130,246,0.4);
}

.header-center{
  display:flex;
  justify-content:center;
  width:100%;
}

.brand{
  display:flex;
  flex-direction:column;
  align-items:center; 
}

.brand-top{
  display:flex;
  align-items:center;
  gap:6px;
  font-size:18px;
  font-weight:600;
  color:#2563eb;
}

.brand-bottom{
  display:flex;
  align-items:center;   
  justify-content:center;
  gap:6px;

  font-size:18px;
  font-weight:600;
  color:#2563eb;

  margin-top:2px;
}

.server-svg{
  width:18px;
  height:18px;
  position:relative;
  top:-1px; 
}

.brand-bottom:hover .server-svg{
  transform:scale(1.15);
}

.logo-svg{
  width:18px;
  height:18px;
}

.brand-bottom{
  margin-top:2px;
}


.hamburger{
  position:absolute;
  left:15px;
  top:50%;
  transform:translateY(-50%);

  width:42px;
  height:42px;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:5px;

  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(12px);

  border-radius:14px;
  border:1px solid rgba(255,255,255,0.4);

  box-shadow:
    0 8px 20px rgba(0,0,0,0.08),
    inset 0 1px 0 rgba(255,255,255,0.6);

  cursor:pointer;
  z-index:200;

  transition:0.3s cubic-bezier(.4,0,.2,1);
}


.hamburger:hover{
  transform:translateY(-50%) scale(1.06);
  box-shadow:
    0 12px 25px rgba(0,0,0,0.15),
    inset 0 1px 0 rgba(255,255,255,0.6);
}


.hamburger span{
  display:block;
  height:2.5px;
  width:18px;
  background:#2563eb;
  border-radius:10px;
  transition:0.4s cubic-bezier(.4,0,.2,1);
}


.hamburger.active span:nth-child(1){
  transform:translateY(7px) rotate(45deg);
}

.hamburger.active span:nth-child(2){
  opacity:0;
  transform:scale(0);
}

.hamburger.active span:nth-child(3){
  transform:translateY(-7px) rotate(-45deg);
}


.menu{
  position:absolute;
  top:70px;
  left:5px;

  padding:12px;
  display:flex;
  flex-direction:column;
  gap:10px;

  width:max-content;

  
  background:rgba(255,255,255,0.15); 
  backdrop-filter:blur(60px) saturate(200%);
  -webkit-backdrop-filter:blur(60px) saturate(200%);

  border-radius:16px;
  border:1px solid rgba(255,255,255,0.25);

  box-shadow:
    0 20px 50px rgba(0,0,0,0.25),
    inset 0 1px 0 rgba(255,255,255,0.6);

  opacity:0;
  transform:translateY(-12px) scale(0.95);
  pointer-events:none;

  transition:0.35s cubic-bezier(.4,0,.2,1);
  z-index:150;
}

.menu::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:inherit;

  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(80px);
  -webkit-backdrop-filter:blur(80px);

  z-index:-1;
}


.menu.active{
  opacity:1;
  transform:translateY(0) scale(1);
  pointer-events:auto;
}



.menu-btn{
  display:flex;
  align-items:center;
  gap:10px;

  padding:10px 16px;

  border-radius:12px;

  font-size:14px;
  font-weight:500;

  text-decoration:none;
  color:white;

  white-space:nowrap;

  transition:0.25s cubic-bezier(.4,0,.2,1);
}


.menu-btn.wa{
  background:linear-gradient(135deg,#25D366,#1ebe5d);
}
